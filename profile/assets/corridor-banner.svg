      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#111B2E"/>
      <stop offset="1" stop-color="#1A2D4A"/>
    </linearGradient>
    <linearGradient id="accent" x1="172" y1="82" x2="402" y2="312" gradientUnits="userSpaceOnUse">
