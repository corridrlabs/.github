      <stop offset="0" stop-color="#070B14"/>
      <stop offset="0.45" stop-color="#0C1730"/>
      <stop offset="1" stop-color="#102447"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 70) rotate(28) scale(360 180)">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
